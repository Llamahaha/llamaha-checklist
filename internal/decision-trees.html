<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internal Guided Triage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/llamaha-icon.jpg">
  <link rel="stylesheet" href="../styles.css">
</head>
<body data-site-area="internal" data-root-path="..">
  <div class="page-shell">
    <nav class="page-nav" aria-label="Page">
      <a href="index.html">Internal Home</a>
      <span>/</span>
      <strong>Guided Triage</strong>
    </nav>

    <main class="hub-shell resource-page">
      <section class="hero-card">
        <div class="builder-header">
          <img class="brand-icon" src="../assets/llamaha-icon.jpg" alt="Llamaha icon">
          <div class="section-heading">
            <p class="section-kicker">Guided Triage</p>
            <h1>Decision trees for common support calls</h1>
            <p class="builder-copy">Use these internal flows when Teams, OneDrive, printers, VPN, or Office activation needs a quick first-pass path before deeper troubleshooting.</p>
          </div>
        </div>
      </section>

      <section class="results-card hub-section">
        <div class="decision-layout">
          <aside class="decision-list-shell">
            <p class="section-kicker">Pick a Tree</p>
            <h2>Start with the symptom</h2>
            <div id="treeList" class="decision-list"></div>
          </aside>

          <section id="decisionStage" class="decision-stage" aria-live="polite"></section>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../siteChrome.js"></script>
  <script type="module" src="../decision-trees.js"></script>
</body>
</html>
