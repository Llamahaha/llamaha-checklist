<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internal Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/llamaha-icon.jpg">
  <link rel="stylesheet" href="../styles.css">
</head>
<body data-site-area="internal" data-root-path="..">
  <div class="page-shell">
    <nav class="page-nav" aria-label="Page">
      <a href="index.html">Internal Home</a>
      <span>/</span>
      <strong>Search</strong>
    </nav>

    <main class="hub-shell resource-page">
      <section class="hero-card">
        <div class="builder-header">
          <img class="brand-icon" src="../assets/llamaha-icon.jpg" alt="Llamaha icon">
          <div class="section-heading">
            <p class="section-kicker">Internal Search</p>
            <h1>Search internal and public help</h1>
            <p class="builder-copy">Search technician references, playbooks, snippets, tips, checklists, and the public help center from one internal page.</p>
          </div>
        </div>
        <form id="searchForm" class="search-form">
          <input id="searchInput" class="search-input" type="search" placeholder="Search Outlook, VPN, printer, MFA, scan, licensing, mailbox, snippets..." aria-label="Search query">
          <select id="searchCategory" class="search-select" aria-label="Search category">
            <option value="all">All internal and public results</option>
            <option value="internal">Internal results</option>
            <option value="public">Public results</option>
            <option value="internalReference">Reference guides</option>
            <option value="internalPlaybook">Playbooks</option>
            <option value="internalTip">Tips &amp; tricks</option>
            <option value="internalSnippet">Snippets</option>
            <option value="internalChecklist">Checklists</option>
          </select>
          <button type="submit" class="primary-btn">Search</button>
        </form>
      </section>

      <section class="results-card hub-section">
        <div class="results-header">
          <div>
            <p class="section-kicker">Results</p>
            <h2 id="resultsLabel">Start with a search</h2>
          </div>
        </div>
        <div id="resultCount" class="hub-section-copy"></div>
        <div id="searchResults" class="search-results"></div>
      </section>
    </main>
  </div>

  <script type="module" src="../siteChrome.js"></script>
  <script type="module" src="../internal-search.js"></script>
</body>
</html>
